name: ci

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  tests:
    name: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cargo tests
        run: cargo test --tests

  consumer-smoke:
    name: consumer-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build staticlib and shared lib
        run: cargo build --release
      - name: Build C smoke harness (static)
        run: gcc -std=c11 -Wall -Wextra -Iinclude harness/consumer_smoke.c target/release/librtc_rs_core.a -lpthread -ldl -lm -o /tmp/consumer_smoke
      - name: Run C smoke harness (static)
        run: /tmp/consumer_smoke
      - name: Build C callback smoke harness (shared)
        run: gcc -std=c11 -Wall -Wextra -Iinclude harness/consumer_smoke_callback.c -Ltarget/release -lrtc_rs_core -lpthread -ldl -lm -o /tmp/consumer_smoke_callback
      - name: Run C callback smoke harness (shared)
        run: LD_LIBRARY_PATH=target/release /tmp/consumer_smoke_callback

  policy:
    name: policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: PM validate
        run: python3 .pm/scripts/validate_pm.py .
      - name: PM toggles
        run: python3 .pm/scripts/check_pm_toggles.py .
      - name: PM task binding (PR range)
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          python3 .pm/scripts/check_pm_task_binding.py . \
            --base "origin/${{ github.base_ref }}" \
            --head "${{ github.sha }}"
      - name: PM task binding (push range)
        if: github.event_name == 'push'
        run: |
          python3 .pm/scripts/check_pm_task_binding.py . \
            --base "${{ github.event.before }}" \
            --head "${{ github.sha }}"
      - name: Changelog policy
        run: ./scripts/check_changelog.sh
      - name: ABI parity policy
        run: ./scripts/check_abi_parity.py
      - name: ABI compatibility policy
        run: ./scripts/check_abi_compat_policy.py
      - name: Packaging contract gate
        run: ./scripts/check_packaging_contract.sh
      - name: Consumer quickstart gate
        run: ./scripts/check_consumer_quickstart.sh
      - name: Release notes generation gate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/prepare_release_notes.py
