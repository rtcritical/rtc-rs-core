name: labels-sync

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - .github/labels.yml
      - .github/workflows/labels-sync.yml

permissions:
  contents: read
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync labels
        uses: crazy-max/ghaction-github-labeler@v5
        with:
          yaml-file: .github/labels.yml
          skip-delete: true
