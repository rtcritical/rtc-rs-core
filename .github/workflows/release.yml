name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test --tests

      - name: Packaging contract gate
        run: ./scripts/check_packaging_contract.sh

      - name: Prepare release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/prepare_release_notes.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: dist/release_notes.md
          files: |
            dist/rtc-rs-core-source.tar.gz
            dist/rtc-rs-core-headers.tar.gz
            dist/SHA256SUMS
