name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test --tests

      - name: Build release artifacts
        run: |
          set -euo pipefail
          mkdir -p dist

          cargo build --release
          cp target/release/librtc_rs_core.rlib dist/ 2>/dev/null || true

          tar -czf dist/rtc-rs-core-source.tar.gz \
            --exclude .git \
            --exclude target \
            --exclude dist \
            .

          mkdir -p dist/include
          cp include/core_v0.h dist/include/
          tar -czf dist/rtc-rs-core-headers.tar.gz -C dist include

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > SHA256SUMS

      - name: Prepare release notes
        run: ./scripts/prepare_release_notes.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: dist/release_notes.md
          files: |
            dist/rtc-rs-core-source.tar.gz
            dist/rtc-rs-core-headers.tar.gz
            dist/SHA256SUMS
