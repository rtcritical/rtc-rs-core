schema_version: 1
facet:
  id: github.release-ops
  version: 1.0.0
  description: GitHub release governance overlay for PM-managed projects
compatibility:
  pm_schema: ">=2.0.0 <3.0.0"
dependencies:
  requires:
    - github.core
  conflicts: []
contributions:
  files:
    .pm/policies/rtc-github-release-ops-policy.md: |
      # Policy - RTC GitHub Release Ops

      - Release tags (`v*`) must be reproducible from git state and workflow evidence.
      - Release notes generation must be deterministic and validated in CI.
      - Tag ruleset bypass, when required, must be least-privilege and explicitly documented.
      - Failed release attempts should be superseded by a new tag/version; avoid mutating published tags.

    .pm/procedures/rtc-github-release-ops-runbook.md: |
      # Procedure - RTC GitHub Release Ops Runbook

      1. Validate PM state and release task evidence before tagging.
      2. Verify checkout depth and tag/history requirements for release notes generation.
      3. Cut a real `v*` tag and verify workflow completion + asset publication.
      4. If release fails, capture root cause, patch in PR, and cut next patch tag.
      5. Record release IDs, URLs, and workflow run IDs in task evidence.

    .pm/templates/rtc-github-release-verification-checklist.md: |
      # RTC GitHub Release Verification Checklist

      - [ ] release workflow completed successfully
      - [ ] release is non-draft and non-prerelease (unless explicitly intended)
      - [ ] expected assets published
      - [ ] notes contain expected sections/categories
      - [ ] release URL and ID recorded in PM evidence

  checks:
    - id: rtc-github-release-policy-present
      type: file_exists
      path: .pm/policies/rtc-github-release-ops-policy.md
    - id: rtc-github-release-runbook-present
      type: file_exists
      path: .pm/procedures/rtc-github-release-ops-runbook.md
    - id: rtc-github-release-checklist-present
      type: file_exists
      path: .pm/templates/rtc-github-release-verification-checklist.md
